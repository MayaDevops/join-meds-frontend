name: Deploy React App to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Upload dist to temporary folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/tmp/join-meds-build"
          strip_components: 1

      - name: Deploy to Nginx folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            sudo mkdir -p /var/www/join-meds-frontend/dist
            sudo rsync -av --delete /tmp/join-meds-build/ /var/www/join-meds-frontend/dist/
            sudo chown -R www-data:www-data /var/www/join-meds-frontend/dist
            sudo find /var/www/join-meds-frontend/dist -type d -exec chmod 755 {} \;
            sudo find /var/www/join-meds-frontend/dist -type f -exec chmod 644 {} \;
            sudo nginx -t
            sudo systemctl reload nginx
            rm -rf /tmp/join-meds-build
