name: Deploy React App to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Show versions
        run: |
          node -v
          pnpm -v

      # IMPORTANT:
      # - Do NOT delete pnpm-lock.yaml in CI
      # - Do NOT keep/use package-lock.json if using pnpm
      - name: Install dependencies (clean, deterministic)
        run: |
          rm -rf node_modules
          pnpm install --frozen-lockfile

      # Safety: ensure Tailwind native binding is built/available
      - name: Rebuild Tailwind native deps
        run: pnpm rebuild @tailwindcss/oxide || true

      - name: Build React app
        env:
          CI: true
        run: pnpm run build

      - name: List dist folder
        run: ls -lah dist

      - name: Clean remote dist folder before upload
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            sudo rm -rf /var/www/join-meds-frontend/dist
            sudo mkdir -p /var/www/join-meds-frontend/dist

      - name: Upload built files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "dist/**"
          target: "/var/www/join-meds-frontend/"

      - name: Fix permissions and restart Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            sudo chown -R www-data:www-data /var/www/join-meds-frontend/dist
            sudo find /var/www/join-meds-frontend/dist -type d -exec chmod 755 {} \;
            sudo find /var/www/join-meds-frontend/dist -type f -exec chmod 644 {} \;
            sudo nginx -t
            sudo systemctl restart nginx